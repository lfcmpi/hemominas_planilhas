<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HOB Bolsas de Sangue</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-brand">
                <span class="login-brand-title">Hemominas</span>
                <span class="login-brand-separator">&gt;</span>
                <span class="login-brand-subtitle">Sheets</span>
            </div>
            <p class="login-tagline">Banco de Sangue HMOB</p>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="/login" class="login-form">
                <label class="login-label">
                    Email
                    <input type="email" name="email" required autofocus placeholder="seu@email.com" class="login-input">
                </label>
                <label class="login-label">
                    Senha
                    <input type="password" name="password" required placeholder="Senha" class="login-input">
                </label>
                <button type="submit" class="btn btn-login">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>
